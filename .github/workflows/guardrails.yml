name: Guardrails

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  guardrails:
    name: guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Repository safety check
        run: bash scripts/guardrails.sh check
