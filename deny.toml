# cargo-deny configuration. Verified for cargo-deny v0.16+ (version = 2 schema).
# Run: cargo deny check

[advisories]
version = 2
ignore = []

[licenses]
version = 2
# Permissive licenses compatible with an MIT-licensed project.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

# `ring` ships a custom LICENSE file (an aggregate of MIT/ISC/OpenSSL terms)
# rather than an SPDX `license` field, so cargo-deny cannot classify it. Clarify
# it explicitly. The hash pins the LICENSE we audited; if ring changes it,
# cargo-deny fails loudly and we re-review.
[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
# Duplicate transitive versions are common; warn rather than fail.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
